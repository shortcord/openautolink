name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'companion/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Car App Unit Tests ──────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Download native deps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for ABI in arm64-v8a x86_64; do
            gh release download native-deps -p "native-deps-${ABI}.tar.gz" -O "/tmp/native-deps-${ABI}.tar.gz"
            tar xzf "/tmp/native-deps-${ABI}.tar.gz" -C app/src/main/cpp/
          done

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14
