name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'bridge/**'
      - 'external/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── JVM Unit & Integration Tests ────────────────────────────────
  # Runs all unit tests including transport integration tests
  # (MockOalBridgeServer with real TCP connections). No emulator needed.
  unit-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14

  # ── Bridge C++ Build Verification (Stub Mode) ──────────────────
  # Builds the bridge binary in stub mode (no aasdk) on x86 Linux.
  # Verifies the C++ code compiles without ARM64 or aasdk dependencies.
  bridge-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ build-essential

      - name: Configure CMake (stub mode)
        run: |
          cmake -B build-stub \
            -S bridge/openautolink/headless \
            -DCMAKE_BUILD_TYPE=Release \
            -DPI_AA_ENABLE_AASDK_LIVE=OFF

      - name: Build
        run: cmake --build build-stub -j$(nproc)

      - name: Verify binary
        run: |
          test -f build-stub/openautolink-headless
          file build-stub/openautolink-headless
          echo "Bridge stub build OK"

  # NOTE: Emulator smoke test removed from CI — GitHub Actions runners lack KVM
  # hardware acceleration, so the AAOS emulator can't boot within the 30min timeout.
  # For local emulator testing, see: docs/testing.md
