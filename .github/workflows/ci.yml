name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── JVM Unit & Integration Tests ────────────────────────────────
  # Runs all unit tests including transport integration tests
  # (MockOalBridgeServer with real TCP connections). No emulator needed.
  unit-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14

  # ── Emulator Smoke Test ─────────────────────────────────────────
  # Boots AAOS emulator, installs APK, runs mock bridge, verifies app starts.
  # Runs on push to main only (emulator tests are slow and flaky on PRs).
  emulator-smoke-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install emulator and system image
        run: |
          sdkmanager --install "emulator"
          sdkmanager --install "system-images;android-33;google_apis;x86_64"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd \
            --name "CI_AAOS" \
            --package "system-images;android-33;google_apis;x86_64" \
            --device "automotive_1024p_landscape" \
            --force

      - name: Start emulator
        run: |
          $ANDROID_HOME/emulator/emulator -avd CI_AAOS \
            -no-window -no-audio -gpu swiftshader_indirect \
            -no-boot-anim -no-snapshot &
          # Wait for boot
          adb wait-for-device
          adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done'
          echo "Emulator booted"

      - name: Set up ADB reverse for mock bridge
        run: |
          adb reverse tcp:5288 tcp:5288
          adb reverse tcp:5289 tcp:5289
          adb reverse tcp:5290 tcp:5290

      - name: Start mock bridge
        run: |
          python3 scripts/mock_bridge.py \
            --width 1920 --height 1080 --fps 15 \
            --no-simulate &
          MOCK_PID=$!
          echo "MOCK_PID=$MOCK_PID" >> $GITHUB_ENV
          sleep 2
          # Verify mock bridge is listening
          ss -tlnp | grep -E '5288|5289|5290' || true

      - name: Install and launch app
        run: |
          adb install app/build/outputs/apk/debug/app-debug.apk
          adb shell am start -n com.openautolink.app/.ui.MainActivity
          sleep 5

      - name: Verify app is running
        run: |
          # Check app process is alive
          adb shell pidof com.openautolink.app || {
            echo "App process not found!"
            adb logcat -d -s "SessionManager:*" "ConnectionManager:*" "TcpControlChannel:*" | tail -50
            exit 1
          }
          echo "App is running"

          # Dump relevant logcat for diagnostics
          adb logcat -d -s "SessionManager:*" "ConnectionManager:*" "TcpControlChannel:*" "TcpVideoChannel:*" | tail -30

      - name: Cleanup
        if: always()
        run: |
          kill $MOCK_PID 2>/dev/null || true
          adb emu kill 2>/dev/null || true
