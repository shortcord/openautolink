name: Release Bridge

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-bridge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build bridge in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            arm64v8/ubuntu:22.04 bash -c '
              set -e
              apt-get update
              apt-get install -y cmake g++ make git \
                libboost-all-dev libusb-1.0-0-dev \
                libssl-dev libprotobuf-dev protobuf-compiler \
                libabsl-dev

              mkdir -p build-bridge
              cd build-bridge

              cmake ../bridge/openautolink/headless \
                -DCMAKE_BUILD_TYPE=Release \
                -DPI_AA_ENABLE_AASDK_LIVE=ON \
                -DPI_AA_AASDK_SOURCE_DIR=/src/external/opencardev-aasdk \
                -DPI_AA_OPENAUTO_SOURCE_DIR=/src/external/opencardev-openauto \
                -DSKIP_BUILD_ABSL=ON

              cmake --build . --target openautolink-headless -j$(nproc)
              strip -o openautolink-headless-stripped openautolink-headless
            '

      - name: Upload bridge binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: build-bridge/openautolink-headless-stripped
