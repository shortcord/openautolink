name: Release Bridge

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-bridge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compilation toolchain
        run: |
          # Add ARM64 architecture
          sudo dpkg --add-architecture arm64

          # GitHub runners' default sources serve amd64 only.
          # Restrict them to [arch=amd64] and add ports.ubuntu.com for arm64.
          sudo sed -i 's/^deb \(http\|https\)/deb [arch=amd64] \1/' /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i 's/^deb \(http\|https\)/deb [arch=amd64] \1/' /etc/apt/sources.list 2>/dev/null || true
          # Fix double [arch=...] if already present
          sudo sed -i 's/\[arch=amd64\] \[arch=amd64\]/[arch=amd64]/' /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i 's/\[arch=amd64\] \[arch=amd64\]/[arch=amd64]/' /etc/apt/sources.list 2>/dev/null || true

          # Add ports.ubuntu.com for arm64 packages
          cat << 'SOURCES' | sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          SOURCES

          sudo apt-get update
          sudo apt-get install -y \
            g++-aarch64-linux-gnu \
            cmake make git \
            libboost-system-dev:arm64 \
            libboost-log-dev:arm64 \
            libboost-filesystem-dev:arm64 \
            libboost-thread-dev:arm64 \
            libssl-dev:arm64 \
            libusb-1.0-0-dev:arm64 \
            libbluetooth-dev:arm64 \
            libprotobuf-dev:arm64 \
            libabsl-dev:arm64 \
            protobuf-compiler

      - name: Cross-compile bridge for ARM64
        run: |
          cat > /tmp/aarch64-toolchain.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH /usr/aarch64-linux-gnu /usr)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          set(CMAKE_LIBRARY_PATH /usr/lib/aarch64-linux-gnu)
          set(CMAKE_INCLUDE_PATH /usr/include)
          EOF

          mkdir -p build-bridge
          cd build-bridge

          cmake ../bridge/openautolink/headless \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/aarch64-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DPI_AA_ENABLE_AASDK_LIVE=ON \
            -DPI_AA_AASDK_SOURCE_DIR=${{ github.workspace }}/external/opencardev-aasdk \
            -DPI_AA_OPENAUTO_SOURCE_DIR=${{ github.workspace }}/external/opencardev-openauto \
            -DSKIP_BUILD_ABSL=ON \
            -DSKIP_BUILD_PROTOBUF=ON \
            -DBUILD_AASDK_STATIC=ON

          cmake --build . --target openautolink-headless -j$(nproc)
          aarch64-linux-gnu-strip -o openautolink-headless-stripped openautolink-headless

      - name: Upload bridge binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: build-bridge/openautolink-headless-stripped
