name: Release APKs

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download native deps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for ABI in arm64-v8a x86_64; do
            gh release download native-deps -p "native-deps-${ABI}.tar.gz" -O "/tmp/native-deps-${ABI}.tar.gz"
            tar xzf "/tmp/native-deps-${ABI}.tar.gz" -C app/src/main/cpp/
          done

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Decode keystore
        run: |
          mkdir -p secrets
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > secrets/upload-key.jks

      - name: Build car app release APK
        env:
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
          UPLOAD_STORE_PASSWORD: ${{ secrets.UPLOAD_STORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Build companion release APK
        env:
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
          UPLOAD_STORE_PASSWORD: ${{ secrets.UPLOAD_STORE_PASSWORD }}
        run: |
          ./gradlew :companion:assembleRelease --no-daemon

      - name: Rename APKs
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/openautolink-car-${TAG}.apk"
          mv companion/build/outputs/apk/release/companion-release.apk \
             "companion/build/outputs/apk/release/openautolink-companion-${TAG}.apk"

      - name: Upload APKs to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/openautolink-car-*.apk
            companion/build/outputs/apk/release/openautolink-companion-*.apk
