name: Fork Build

# For fork users: builds a signed AAB with a custom applicationId.
# Set these secrets on your fork:
#   APP_ID                  — your unique application ID (e.g. com.johndoe.autolink)
#   UPLOAD_KEYSTORE_BASE64  — base64-encoded upload keystore (.jks)
#   UPLOAD_KEY_PASSWORD     — keystore and key password
#
# Native deps are downloaded from the upstream repo's public release.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'companion/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'

permissions:
  contents: write

jobs:
  build:
    # Skip on the upstream repo — this workflow is only for forks
    if: github.repository != 'mossyhub/openautolink'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          missing=""
          if [ -z "${{ secrets.APP_ID }}" ]; then missing="$missing APP_ID"; fi
          if [ -z "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" ]; then missing="$missing UPLOAD_KEYSTORE_BASE64"; fi
          if [ -z "${{ secrets.UPLOAD_KEY_PASSWORD }}" ]; then missing="$missing UPLOAD_KEY_PASSWORD"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "See README.md for setup instructions."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Download native deps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download from upstream public release — no auth needed
          for ABI in arm64-v8a x86_64; do
            echo "Downloading native-deps-${ABI}.tar.gz from upstream..."
            gh release download native-deps \
              -R mossyhub/openautolink \
              -p "native-deps-${ABI}.tar.gz" \
              -O "/tmp/native-deps-${ABI}.tar.gz"
            tar xzf "/tmp/native-deps-${ABI}.tar.gz" -C app/src/main/cpp/
          done

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Decode keystore
        run: |
          mkdir -p secrets
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > secrets/upload-key.jks

      - name: Build signed AAB
        env:
          UPLOAD_KEY_ALIAS: upload
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
          UPLOAD_STORE_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease \
            -PappId="${{ secrets.APP_ID }}" \
            --no-daemon

      - name: Build companion APK
        run: |
          ./gradlew :companion:assembleRelease --no-daemon

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' secrets/version.properties | cut -d= -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}-$(date -u +%Y%m%d%H%M%S)"

          # Rename outputs
          mv app/build/outputs/bundle/release/app-release.aab \
             "app/build/outputs/bundle/release/openautolink-car-${VERSION}.aab"
          mv companion/build/outputs/apk/release/companion-release.apk \
             "companion/build/outputs/apk/release/openautolink-companion-${VERSION}.apk"

          gh release create "$TAG" \
            --title "OpenAutoLink v${VERSION}" \
            --notes "Built from $(git rev-parse --short HEAD) with applicationId \`${{ secrets.APP_ID }}\`" \
            "app/build/outputs/bundle/release/openautolink-car-${VERSION}.aab" \
            "companion/build/outputs/apk/release/openautolink-companion-${VERSION}.apk"
